<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO240 Logbook</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>XO240 Logbook</h1>
  <button id="themeToggle">Theme</button>
</header>

<main>

<!-- ===== LOG ===== -->
<section class="page active" id="log">

  <span class="page-label">[ XO240 ]</span>
  <h2 id="logTitle">Log outing</h2>

  <label>Date</label>
  <input id="date" type="date">

  <div class="grid">
    <div>
      <label>Departure</label>
      <input id="departure" type="time">
    </div>
    <div>
      <label>Arrival</label>
      <input id="arrival" type="time">
    </div>
  </div>

  <label>Captain</label>
  <select id="captain">
    <option>Jaan</option>
    <option>Juhan</option>
  </select>

  <label>Participants</label>
  <textarea id="participants"></textarea>

  <label>Route / Area</label>
  <input id="route">

  <div class="grid">
    <div>
      <label>Miles</label>
      <input id="miles" type="number">
    </div>
    <div>
      <label>Fuel (L)</label>
      <input id="fuel" type="number">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Engine hours (departure)</label>
      <input id="engineStart" type="number" step="0.1">
    </div>
    <div>
      <label>Engine hours (arrival)</label>
      <input id="engineEnd" type="number" step="0.1">
    </div>
  </div>

  <label>Trip photo</label>
  <input id="photo" type="file" accept="image/*" capture="environment">

  <div class="btn-row">
    <button id="saveTripBtn" onclick="saveTrip()">Save outing</button>
    <button id="cancelEditBtn" class="btn-secondary" style="display:none;" onclick="cancelTripEdit()">Cancel</button>
  </div>

</section>


<!-- ===== TRIPS ===== -->
<section class="page" id="trips">

  <span class="page-label">[ XO240 ]</span>
  <h2>Outings</h2>

  <label>Filter by date</label>
  <input id="tripFilterDate" type="date" onchange="renderTrips()">

  <div id="tripList"></div>

</section>


<!-- ===== TRIP DETAIL ===== -->
<section class="page" id="tripDetail">
  <h2>Trip details</h2>
  <div id="tripDetailContent"></div>
  <button onclick="showPage('trips')">← Back</button>
</section>


<!-- ===== EXPENSES ===== -->
<section class="page" id="invoices">

  <span class="page-label">[ XO240 ]</span>
  <h2>Expenses</h2>

  <label>Date</label>
  <input id="invoiceDate" type="date">

  <label>Description</label>
  <input id="invoiceDesc" placeholder="e.g. Engine service">

  <div class="grid">
    <div>
      <label>Category</label>
      <select id="invoiceCategory">
        <option>Fuel</option>
        <option>Maintenance</option>
        <option>Marina</option>
        <option>Insurance</option>
        <option>Equipment</option>
        <option>Other</option>
      </select>
    </div>
    <div>
      <label>Amount (€)</label>
      <input id="invoiceAmount" type="number" step="0.01" placeholder="0.00">
    </div>
  </div>

  <label>Receipt photo</label>
  <input id="invoicePhoto" type="file" accept="image/*" capture="environment">

  <div class="btn-row">
    <button id="saveInvoiceBtn" onclick="saveInvoice()">Add expense</button>
    <button id="cancelInvoiceBtn" class="btn-secondary" style="display:none;" onclick="cancelInvoiceEdit()">Cancel</button>
  </div>

  <div id="invoiceList"></div>

</section>


<!-- ===== NOTES ===== -->
<section class="page" id="notes">

  <span class="page-label">[ XO240 ]</span>
  <h2>Notes</h2>

  <button onclick="toggleNoteForm()">+ New note</button>

  <div id="noteForm" style="display:none">

    <textarea id="noteText" placeholder="Write your note here…" rows="4"></textarea>

    <label>Attach photo</label>
    <input id="notePhoto" type="file" accept="image/*" capture="environment">

    <button type="button" onclick="getLocation()">📍 Attach GPS location</button>
    <div id="locationDisplay"></div>

    <div class="btn-row">
      <button id="saveNoteBtn" onclick="saveNote()">Save note</button>
      <button class="btn-secondary" onclick="cancelNoteEdit()">Cancel</button>
    </div>

  </div>

  <div id="notesList"></div>

</section>


<!-- ===== NOTE DETAIL ===== -->
<section class="page" id="noteDetail">
  <h2>Note</h2>
  <div id="noteDetailContent"></div>
  <button onclick="showPage('notes')">← Back</button>
</section>


<!-- ===== WARNINGS ===== -->
<section class="page" id="warnings">

  <div id="warningsMapWrap">
    <div id="warningsMap"></div>
    <div id="warningsMapOverlay">
      <span id="warningsCount">—</span>
      <span class="warnings-count-label">active warnings</span>
    </div>
  </div>

  <div id="warningsListWrap">
    <span class="page-label">[ XO240 ]</span>
    <h2>Warnings</h2>
    <div id="warningsList"></div>
  </div>

</section>


</main>


<nav>
  <button id="navLog" onclick="showPage('log')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    Log
  </button>
  <button id="navTrips" onclick="showPage('trips')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 17l4-8 4 4 4-6 4 10"/><path d="M3 21h18"/>
    </svg>
    Trips
  </button>
  <button id="navInvoices" onclick="showPage('invoices')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
    </svg>
    Expenses
  </button>
  <button id="navNotes" onclick="showPage('notes')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
    </svg>
    Notes
  </button>
  <button id="navWarnings" onclick="showPage('warnings')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    Warnings
  </button>
</nav>

<div id="toast"></div>
<iframe id="hiddenFrame" name="hiddenFrame" style="display:none;"></iframe>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
